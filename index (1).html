<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ADHD Analytics | Advanced Prediction System</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel='stylesheet' href='styles.css'>
</head>
<body class='bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 min-h-screen flex items-center justify-center p-4'>
    <div class='glass-container max-w-md w-full bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white border-opacity-20 text-white'>
        <header class='text-center mb-8'>
            <h1 class='text-3xl font-bold tracking-tight'>ADHD Analytics</h1>
            <p class='text-purple-200 text-sm'>AI-Driven Clinical Assessment Tool</p>
        </header>

        <!-- Multi-Step Form -->
        <form id='adhdForm' class='space-y-6'>
            <!-- Step 1: Demographics -->
            <div id='step-1' class='form-step'>
                <h3 class='text-xl font-semibold mb-4 border-b border-purple-400 pb-2'>Step 1: Demographics</h3>
                <div class='space-y-4'>
                    <div>
                        <label class='block text-sm font-medium mb-1'>Age</label>
                        <input type='number' name='Age' id='age' required min='1' max='100' class='w-full bg-white bg-opacity-20 border border-purple-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-500 placeholder-purple-200'>
                    </div>
                    <div>
                        <label class='block text-sm font-medium mb-1'>Gender</label>
                        <select name='Gender' id='gender' required class='w-full bg-purple-800 bg-opacity-50 border border-purple-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-500'>
                            <option value='' disabled selected>Select Gender</option>
                            <option value='1'>Male</option>
                            <option value='0'>Female</option>
                        </select>
                    </div>
                </div>
                <button type='button' onclick='nextStep(2)' class='w-full mt-6 bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded-xl transition duration-300 shadow-lg'>Next: Cognitive Data</button>
            </div>

            <!-- Step 2: Cognitive Assessment -->
            <div id='step-2' class='form-step hidden'>
                <h3 class='text-xl font-semibold mb-4 border-b border-purple-400 pb-2'>Step 2: Cognitive Profile</h3>
                <div class='space-y-4'>
                    <div>
                        <label class='block text-sm font-medium mb-1'>IQ Score</label>
                        <input type='number' name='IQ' id='iq' required min='50' max='200' step='0.1' class='w-full bg-white bg-opacity-20 border border-purple-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-500 placeholder-purple-200'>
                    </div>
                </div>
                <div class='flex space-x-3 mt-6'>
                    <button type='button' onclick='nextStep(1)' class='w-1/3 bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 rounded-xl transition'>Back</button>
                    <button type='submit' class='w-2/3 bg-gradient-to-r from-pink-600 to-indigo-600 hover:from-pink-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl transition shadow-lg'>Analyze Data</button>
                </div>
            </div>
        </form>

        <!-- Result Section -->
        <div id='result-area' class='hidden mt-8 text-center animate-fade-in'>
            <div id='loader' class='hidden flex justify-center mb-4'>
                <div class='animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-pink-500'></div>
            </div>
            <div id='prediction-display' class='p-6 rounded-xl bg-white bg-opacity-20 border border-white border-opacity-30'>
                <h2 class='text-2xl font-bold mb-2'>Assessment Result</h2>
                <p id='prediction-text' class='text-lg font-medium mb-4'></p>
                <button id='downloadBtn' class='bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg font-semibold transition'>Download Clinical Report</button>
            </div>
            <button onclick='resetForm()' class='mt-4 text-purple-200 hover:text-white underline text-sm'>Start New Assessment</button>
        </div>
    </div>
    <script src='script.js'></script>
</body>
</html>
